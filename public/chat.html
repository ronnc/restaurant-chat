<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    header {
      background: linear-gradient(135deg, #b71c1c, #e65100);
      color: white;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      border-radius: 16px 16px 0 0;
    }
    header span { font-size: 20px; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.45;
      font-size: 14px;
    }
    .msg.user {
      white-space: pre-wrap;
      align-self: flex-end;
      background: #e65100;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: white;
      color: #333;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    }
    .msg.assistant h1, .msg.assistant h2, .msg.assistant h3 {
      margin: 8px 0 4px; font-size: 15px; font-weight: 700;
    }
    .msg.assistant h3 { font-size: 14px; }
    .msg.assistant ul, .msg.assistant ol {
      margin: 4px 0 4px 18px; padding: 0;
    }
    .msg.assistant li { margin: 2px 0; }
    .msg.assistant strong { font-weight: 700; }
    .msg.assistant em { font-style: italic; }
    .msg.assistant code {
      background: #f0f0f0; padding: 1px 4px; border-radius: 3px; font-size: 13px;
    }
    .msg.assistant table {
      border-collapse: collapse; margin: 6px 0; width: 100%; font-size: 13px;
    }
    .msg.assistant th, .msg.assistant td {
      border: 1px solid #ddd; padding: 4px 8px; text-align: left;
    }
    .msg.assistant th { background: #f5f5f5; font-weight: 600; }
    .msg.assistant p { margin: 4px 0; }
    .msg.assistant hr { border: none; border-top: 1px solid #ddd; margin: 8px 0; }
    .msg.typing {
      align-self: flex-start;
      background: white;
      color: #999;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
      font-style: italic;
    }
    #input-area {
      padding: 12px;
      background: white;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
    }
    #input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 14px;
      outline: none;
    }
    #input:focus { border-color: #e65100; }
    #send {
      background: #e65100;
      color: white;
      border: none;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #send:hover { background: #bf360c; }
    #send:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <span>🏛️</span> Delhi Darbar — Order Chat
  </header>
  <div id="messages">
    <div class="msg assistant">Namaste! 🙏 Welcome to Delhi Darbar! What can I get for you today? 😊</div>
  </div>
  <div id="input-area">
    <input id="input" type="text" placeholder="Type your order..." autocomplete="off" />
    <button id="send">↑</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const sessionId = crypto.randomUUID();

    marked.setOptions({ breaks: true, gfm: true });
    console.log('Chat initialized with session ID:', sessionId);
    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      if (role === 'assistant') {
        div.innerHTML = marked.parse(text);
        console.log('Assistant message added:', div.innerHTML);
      } else {
        div.textContent = text;
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      addMessage('user', text);
      sendBtn.disabled = true;
      const typing = addMessage('typing', 'Thinking...');
      try {
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, message: text }),
        });
        const data = await resp.json();
        typing.remove();
        addMessage('assistant', data.reply || 'Sorry, something went wrong.');
      } catch {
        typing.remove();
        addMessage('assistant', 'Connection error. Please try again.');
      }
      sendBtn.disabled = false;
      inputEl.focus();
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
    inputEl.focus();
  </script>
</body>
</html>
